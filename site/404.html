<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Not found — Daily Log</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#0E1512">
<meta name="color-scheme" content="dark">
<!-- Fallback redirect to the landing page for anyone who lands on a dead URL. -->
<meta http-equiv="refresh" content="4; url=/">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;1,9..144,400&family=Outfit:wght@300;400;500&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0E1512;--text:#EDF3EE;--muted:#8CA094;--faint:#5C6B62;--serif:"Fraunces",Georgia,serif;--sans:"Outfit",-apple-system,"Segoe UI",sans-serif;--mono:"JetBrains Mono",ui-monospace,Menlo,Consolas,monospace;}
  *{box-sizing:border-box;margin:0;padding:0;}
  html{color-scheme:dark;}
  body{background:var(--bg);background-image:radial-gradient(1000px 500px at 50% -10%,rgba(127,178,255,0.06),transparent 60%);background-attachment:fixed;color:var(--text);font-family:var(--sans);font-weight:300;min-height:100vh;display:grid;place-items:center;padding:40px 22px;text-align:center;-webkit-font-smoothing:antialiased;}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:0.3em;text-transform:uppercase;color:var(--faint);margin-bottom:20px;}
  .code{font-family:var(--serif);font-style:italic;font-size:clamp(56px,16vw,110px);line-height:1;color:var(--muted);margin-bottom:14px;}
  h1{font-family:var(--serif);font-weight:400;font-size:clamp(24px,5vw,34px);letter-spacing:-0.01em;margin-bottom:14px;}
  p{color:var(--muted);font-size:15px;max-width:420px;margin:0 auto 30px;line-height:1.6;}
  a.home{display:inline-flex;align-items:center;gap:9px;font-family:var(--mono);font-weight:700;font-size:13px;letter-spacing:0.04em;background:var(--text);color:var(--bg);border-radius:12px;padding:13px 22px;text-decoration:none;transition:transform .15s ease;}
  a.home:hover{transform:translateY(-2px);}
  .redir{margin-top:22px;font-family:var(--mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--faint);}
  @media (prefers-reduced-motion: reduce){*{transition:none!important;}}
</style>
</head>
<body>
  <main>
    <div class="eyebrow">Daily Log</div>
    <div class="code">404</div>
    <h1>This page wandered off.</h1>
    <p>The link may be old or mistyped. Let's get you back to solid ground.</p>
    <a class="home" href="/">Back to Daily Log →</a>
    <div class="redir">Redirecting you home…</div>
  </main>
  <script>
    // Immediate JS redirect (the meta refresh is the no-JS fallback).
    setTimeout(function () { location.replace('/'); }, 3500);
  </script>
</body>
</html>

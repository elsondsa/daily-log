name: Build APK

# Builds the Daily Log Android APK on GitHub's servers (no local Android SDK).
# Run it from the repo's "Actions" tab -> "Build APK" -> "Run workflow".
#
# - build_type = debug   -> no secrets needed; good for testing on your phone.
# - build_type = release -> signs the APK; requires these repo secrets:
#       ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD,
#       ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD
#   (use the "Create signing keystore" workflow once to generate them).
#
# The APK is always uploaded as a downloadable artifact on the run. If
# deploy_to_site is checked, it's also committed into site/download/ so
# Cloudflare Pages serves it (and the thank-you page button resolves).

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        type: choice
        options: [debug, release]
        default: debug
      deploy_to_site:
        description: "Also commit the APK into site/download/ (serve it live)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Read app version
        id: ver
        run: echo "version=$(grep -oP 'const APP_VERSION\s*=\s*"\K[^"]+' daily-log.html)" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        working-directory: mobile
        run: npm install

      - name: Sync web assets (copy daily-log.html into www/)
        working-directory: mobile
        run: node sync-web.js

      - name: Add Android platform
        working-directory: mobile
        run: npx cap add android

      - name: Generate app icons
        working-directory: mobile
        run: npm run assets
        continue-on-error: true

      - name: Capacitor sync
        working-directory: mobile
        run: npx cap sync android

      - name: Build debug APK
        if: ${{ github.event.inputs.build_type == 'debug' }}
        working-directory: mobile/android
        run: ./gradlew assembleDebug

      - name: Verify signing secrets are set
        if: ${{ github.event.inputs.build_type == 'release' }}
        env:
          KS: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KSP: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KP: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          fail=0
          for v in KS KSP ALIAS KP; do
            if [ -z "${!v}" ]; then echo "::error::Missing/empty secret ($v)"; fail=1; fi
          done
          if [ "$fail" = 1 ]; then
            echo "Release signing needs 4 repo secrets: ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD."
            echo "Run the 'Create signing keystore' workflow, then add them under Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          echo "All signing secrets present."

      - name: Build release APK (unsigned)
        if: ${{ github.event.inputs.build_type == 'release' }}
        working-directory: mobile/android
        run: ./gradlew assembleRelease

      - name: Sign release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        id: sign
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: mobile/android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Stage APK with versioned name
        id: stage
        run: |
          set -e
          VER="${{ steps.ver.outputs.version }}"
          if [ "${{ github.event.inputs.build_type }}" = "release" ]; then
            SRC="${{ steps.sign.outputs.signedReleaseFile }}"
            OUT="daily-log-v${VER}-release.apk"
          else
            SRC="mobile/android/app/build/outputs/apk/debug/app-debug.apk"
            OUT="daily-log-v${VER}-debug.apk"
          fi
          echo "Using APK: $SRC"
          mkdir -p artifact
          cp "$SRC" "artifact/${OUT}"
          echo "out=$OUT" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.stage.outputs.out }}
          path: artifact/${{ steps.stage.outputs.out }}
          if-no-files-found: error

      - name: Deploy APK to site/download
        if: ${{ github.event.inputs.deploy_to_site == 'true' }}
        run: |
          set -e
          mkdir -p site/download
          cp "artifact/${{ steps.stage.outputs.out }}" "site/download/${{ steps.stage.outputs.out }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "site/download/${{ steps.stage.outputs.out }}"
          git commit -m "Deploy ${{ steps.stage.outputs.out }}" || { echo "No change to commit"; exit 0; }
          git push

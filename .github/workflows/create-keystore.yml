name: Create signing keystore (one-time)

# Generates an Android signing keystore + random passwords ON GitHub's servers,
# so you never need a local JDK. Run once, then:
#   1. Download the "keystore-SECRET" artifact from the run.
#   2. Open SECRETS.txt and add the 4 values as repo secrets
#      (Settings -> Secrets and variables -> Actions -> New repository secret).
#   3. DELETE the artifact afterwards (it contains your private key).
# Keep the .jks file itself somewhere safe — every future update must be signed
# with the same key.

on:
  workflow_dispatch:

jobs:
  keystore:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Generate keystore + random passwords
        run: |
          set -e
          STORE_PW=$(openssl rand -base64 24 | tr -dc 'A-Za-z0-9' | head -c 24)
          KEY_PW="$STORE_PW"
          ALIAS=dailylog
          keytool -genkeypair -v -keystore daily-log.jks -alias "$ALIAS" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$STORE_PW" -keypass "$KEY_PW" \
            -dname "CN=Daily Log, OU=App, O=Daily Log, L=NA, ST=NA, C=IN"
          base64 -w0 daily-log.jks > daily-log.jks.base64
          mkdir -p out
          {
            echo "Add these 4 as GitHub repository secrets, then DELETE this artifact:"
            echo
            echo "ANDROID_KEY_ALIAS=$ALIAS"
            echo "ANDROID_KEYSTORE_PASSWORD=$STORE_PW"
            echo "ANDROID_KEY_PASSWORD=$KEY_PW"
            echo "ANDROID_KEYSTORE_BASE64  -> paste the entire contents of daily-log.jks.base64"
          } > out/SECRETS.txt
          mv daily-log.jks daily-log.jks.base64 out/

      - name: Upload keystore artifact (private to repo members)
        uses: actions/upload-artifact@v4
        with:
          name: keystore-SECRET-download-then-delete
          path: out/
          retention-days: 1
